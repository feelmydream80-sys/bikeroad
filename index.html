<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2196F3" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>자전거 로드</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1001; }
    #content { flex: 1; margin-top: 56px; overflow-y: auto; padding: 16px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; color: #333; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .road-card { border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: white; transition: 0.2s; cursor: pointer; }
    .road-card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .road-card img { width: 100%; height: 180px; object-fit: cover; }
    .road-card-body { padding: 12px; }
    .road-card-title { font-size: 1rem; font-weight: bold; margin-bottom: 4px; color: #333; }
    .road-card-desc { font-size: 0.85rem; color: #666; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .road-card-meta { display: flex; gap: 12px; font-size: 0.8rem; color: #999; }
    .road-card-meta span { display: flex; align-items: center; gap: 4px; }
    .road-card-user { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
    .road-card-user img { width: 24px; height: 24px; border-radius: 50%; }
    .road-card-user .name { font-size: 0.85rem; color: #333; }
    .btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-primary { background: #2196F3; color: white; }
    .btn-primary:hover { background: #1976D2; }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .feed-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .feed-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e3f2fd; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .feed-user-info { flex: 1; }
    .feed-user-name { font-weight: bold; color: #333; }
    .feed-time { font-size: 0.75rem; color: #999; }
    .feed-content { margin-bottom: 12px; }
    .feed-actions { display: flex; gap: 16px; border-top: 1px solid #eee; padding-top: 12px; }
    .feed-action { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #666; font-size: 0.9rem; }
    .feed-action:hover { color: #2196F3; }
    .profile-header { text-align: center; padding: 24px; background: white; border-radius: 12px; margin-bottom: 16px; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e3f2fd; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 12px; }
    .profile-name { font-size: 1.5rem; font-weight: bold; color: #333; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
    .profile-stat { text-align: center; }
    .profile-stat-value { font-size: 1.5rem; font-weight: bold; color: #2196F3; }
    .profile-stat-label { font-size: 0.8rem; color: #666; }
    .achievement-list { display: flex; flex-direction: column; gap: 8px; }
    .achievement-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: white; border-radius: 8px; }
    .achievement-icon { width: 40px; height: 40px; border-radius: 50%; background: #fff3e0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .achievement-info { flex: 1; }
    .achievement-name { font-weight: bold; color: #333; }
    .achievement-desc { font-size: 0.8rem; color: #666; }
    .sub-menu { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .sub-menu button { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 20px; cursor: pointer; }
    .sub-menu button.active { background: #2196F3; color: white; border-color: #2196F3; }
    .challenge-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .challenge-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .challenge-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    .challenge-info { flex: 1; }
    .challenge-name { font-weight: bold; color: #333; }
    .challenge-meta { font-size: 0.8rem; color: #666; }
    .challenge-progress { margin-top: 12px; }
    .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; }
    .progress-text { font-size: 0.85rem; color: #666; margin-top: 4px; }
    @media (max-width: 768px) {
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .nav-menu { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="navbar"></div>
    <div id="content">
      <div id="page-road" class="page"></div>
      <div id="page-challenge" class="page"></div>
      <div id="page-friend" class="page"></div>
      <div id="page-popular" class="page"></div>
      <div id="page-profile" class="page"></div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
